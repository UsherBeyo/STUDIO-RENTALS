<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        /* Sidebar styles */
        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            left: 0;
            top: 0;
            background-color: #111;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        /* Main content */
        .main-content {
            margin-left: 250px; /* Same as sidebar width */
            padding: 20px;
        }

        /* Top bar */
        .top-bar {
            width: 100%;
            height: 50px;
            background-color: #333;
            position: fixed;
            top: 0;
            left: 250px; /* Align to right of sidebar */
            padding: 10px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .top-bar button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
        }

        .top-bar button:hover {
            background-color: #45a049;
        }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="#">Bookings</a>
        <a href="#">Rehearsal Rooms</a>
        <a href="#">Equipment</a>
        <a href="#">Notifications</a>
        <a href="#">Calendar</a>

        <!-- Logout Section -->
        <a href="#">Logout</a>

        <!-- Admin Section -->
        <h3 style="color: white; padding-left: 15px;">Admin Panel</h3>
        <a href="#">Create User Profile</a>
        <a href="#">Update User Profile</a>
        <a href="#">Delete User Profile</a>
        <a href="#">Edit User Profile</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <!-- Admin Profile Setup Button -->
            <button onclick="location.href='admin-profile-setup.html'">Admin Profile Setup</button>
        </div>

        <h1>Welcome to the Dashboard</h1>
        <p>This is the main content area of your dashboard. Adjust the sections as per your requirements.</p>
    </div>

</body>
</html>
